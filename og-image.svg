<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  
  <!-- Rimani logo stripes -->
  <rect x="100" y="200" width="8" height="60" fill="#6B8E7F" transform="skewX(-15)"/>
  <rect x="120" y="200" width="8" height="60" fill="#D4915D" transform="skewX(-15)"/>
  <rect x="140" y="200" width="8" height="60" fill="#C97C7C" transform="skewX(-15)"/>
  <rect x="160" y="200" width="8" height="60" fill="#E8C468" transform="skewX(-15)"/>
  
  <!-- Rimani text -->
  <text x="200" y="245" font-family="Georgia, serif" font-size="48" fill="#ffffff" font-style="italic">Rimani</text>
  
  <!-- Divider -->
  <line x1="100" y1="290" x2="1100" y2="290" stroke="#2a2a2a" stroke-width="2"/>
  
  <!-- Main title -->
  <text x="100" y="370" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="700" fill="#ffffff">Let's build something real.</text>
  
  <!-- Subtitle -->
  <text x="100" y="440" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="32" fill="#888888">A vertically integrated brand.</text>
  <text x="100" y="485" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="32" fill="#888888">Manufacturing to retail. Content to sales.</text>
  
  <!-- TheInnerCircle -->
  <text x="100" y="570" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="300" letter-spacing="8" fill="#ffffff">THEINNERCIRCLE</text>
</svg>
